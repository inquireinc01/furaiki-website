<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>メニュー動作テスト</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 16px; }
  #log { background: #f3f3f3; border: 1px solid #ccc; padding: 12px; min-height: 200px; font-size: 14px; white-space: pre-line; }
  .bar { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; height: 80px; padding: 0 8px; }
  #menu-button2 { padding: 8px; background: none; border: 1px solid #999; border-radius: 6px; }
  #mobile-menu2 { display: none; background: #ffe; border: 1px solid #cc0; padding: 12px; }
  #mobile-menu2.open { display: block; }
  h1 { font-size: 18px; }
</style>
</head>
<body>
<div class="bar">
  <strong>メニュー動作テスト</strong>
  <button id="menu-button2" type="button"
    onclick="document.getElementById('mobile-menu2').classList.toggle('open'); log('onclick発火: メニュー切替');">
    <svg width="24" height="24" fill="none" stroke="#333" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
</div>

<div id="mobile-menu2">✅ メニューが開きました!(もう一度ボタンを押すと閉じます)</div>

<h1>このページの使い方</h1>
<p>右上の三本線ボタンを押してください。下の記録欄にタップの反応が全て表示されます。<br />
この画面の内容(またはスクリーンショット)を教えてください。</p>

<div id="log">記録欄(ここに反応が表示されます):
</div>

<script>
  function log(msg) {
    document.getElementById('log').textContent += '・' + msg + '\n';
  }
  log('JS実行OK / ' + navigator.userAgent);
  log('画面幅: ' + window.innerWidth + 'px / URL: ' + location.protocol + '//' + location.host);
  var btn = document.getElementById('menu-button2');
  ['touchstart', 'touchend', 'pointerdown', 'click'].forEach(function (ev) {
    btn.addEventListener(ev, function () { log(ev + ' 検知'); });
  });
  window.addEventListener('error', function (e) {
    log('⚠ JSエラー: ' + e.message);
  });
</script>
</body>
</html>
